name: rust test

# Builds + tests the sdk-rust workspace (wave-core + wave). The CI gate that
# fully verifies the Rust SDK: fmt, clippy (-D warnings), and the offline
# tcp-mock test suite.
on:
  pull_request:
    paths:
      - "sdk-rust/**"
      - "codegen/**"
      - ".github/workflows/test-rust.yml"
  push:
    branches: [main]
    paths:
      - "sdk-rust/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk-rust
      # All four are hard gates. fmt/clippy were advisory on the initial landing
      # (PR #7) and passed clean on real CI, confirming the generator's output is
      # rustfmt-canonical and clippy-clean (-D warnings) — so they are now required.
      - name: build
        run: cargo build --all
      - name: test
        run: cargo test --all
      - name: rustfmt (check)
        run: cargo fmt --all --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
