name: rubygems publish (OIDC trusted publishing)

# Publishes wave-sdk (sdk-ruby) to RubyGems via OIDC Trusted Publishing — NO
# long-lived RUBYGEMS_API_KEY to leak/rotate. A Trusted Publisher must be
# registered on rubygems.org for this gem (this repo + this workflow) and the
# `rubygems-publish` environment must exist before a real publish. Inert until
# then: tag pushes + the dry-run dispatch only build/verify the gem.
on:
  push:
    tags: ["sdk-ruby-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + verify only (no publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Test + build
        run: |
          ruby -Ilib test/smoke_test.rb
          gem build wave-sdk.gemspec

  publish:
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-ruby-v')
    runs-on: ubuntu-latest
    environment: rubygems-publish
    permissions:
      contents: read
      id-token: write   # OIDC trusted publishing
    defaults:
      run:
        working-directory: sdk-ruby
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      # NOTE: we deliberately do NOT use rubygems/release-gem here. That action runs
      # `bundle exec rake release`, and bundler/gem_tasks derives the release tag as
      # `v<version>` — but this monorepo tags per-language as `sdk-ruby-v<version>`. With
      # that mismatch `rake release` sees the gem as "not yet tagged" and tries to CREATE
      # and `git push` a `v0.1.0` tag, which fails under `contents: read`. So we use the
      # same OIDC credential action release-gem uses internally, then build + push the gem
      # explicitly — no rake, no Rakefile, no Gemfile.lock, no git write needed.
      - name: Configure RubyGems credentials via OIDC trusted publishing
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Build + push gem
        run: |
          gem build wave-sdk.gemspec
          gem push wave-sdk-*.gem
