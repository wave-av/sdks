name: crates.io publish (OIDC trusted publishing)

# Publishes wave-core then wave (sdk-rust) to crates.io via OIDC Trusted
# Publishing — NO long-lived CARGO_REGISTRY_TOKEN to leak/rotate. A Trusted
# Publisher must be registered on crates.io for BOTH crates (this repo + this
# workflow) and the `crates-publish` environment must exist before a real
# publish. Inert until then: tag pushes + the dry-run dispatch only build/verify.
#
# Publish order matters: crates.io requires wave-core to be indexed before the
# umbrella `wave` (which depends on it) can publish.
on:
  push:
    tags: ["sdk-rust-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package + verify only (no publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build + test
        run: cargo build --all && cargo test --all
      - name: Package (dry-run publish)
        run: |
          cargo package -p wave-core
          cargo package -p wave --no-verify

  publish:
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-rust-v')
    runs-on: ubuntu-latest
    environment: crates-publish
    permissions:
      id-token: write   # OIDC trusted publishing
    defaults:
      run:
        working-directory: sdk-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Mint short-lived crates.io token (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish wave-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p wave-core
      - name: Wait for wave-core to index
        run: sleep 30
      - name: Publish wave (umbrella)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p wave
