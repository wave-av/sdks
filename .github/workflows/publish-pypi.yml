name: pypi publish (OIDC trusted publishing)

# Publishes wave-sdk (sdk-python) to PyPI from this PUBLIC repo so PyPI trusted publishing
# (OIDC, Sigstore attestations) works — it cannot from the private monorepo. NO PyPI token to
# leak/rotate; a Trusted Publisher must be registered on pypi.org for this repo + this workflow
# file + the `pypi-publish` environment before a real publish. Inert until then: tag pushes +
# the dry-run dispatch only build + validate the distributions.
on:
  push:
    tags: ["sdk-python-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + validate only (no publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: python -m pip install --upgrade build && python -m build
      - name: Validate metadata (twine check)
        run: python -m pip install --upgrade twine && python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: sdk-python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only on a real tag push (not the dry-run dispatch). Requires the PyPI Trusted Publisher
    # + this environment to be registered first; otherwise the job is never reached on dispatch.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-python-v')
    environment: pypi-publish      # required-reviewer gate on real publishes
    permissions:
      id-token: write              # OIDC trusted publishing + provenance attestation
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/
      - name: Publish to PyPI (OIDC trusted publishing — NO token, attestations ON)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
