name: ruby test

# Builds + tests the wave-sdk gem (sdk-ruby). The CI gate that fully verifies
# the Ruby SDK: syntax check, gem build, and the offline tcp-mock test suite.
on:
  pull_request:
    paths:
      - "sdk-ruby/**"
      - "codegen/**"
      - ".github/workflows/test-ruby.yml"
  push:
    branches: [main]
    paths:
      - "sdk-ruby/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.1", "3.3"]
    defaults:
      run:
        working-directory: sdk-ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - name: Syntax check
        run: find lib -name '*.rb' -print0 | xargs -0 -n1 ruby -c
      - name: Build gem
        run: gem build wave-sdk.gemspec
      - name: Test (offline)
        run: ruby -Ilib test/smoke_test.rb
